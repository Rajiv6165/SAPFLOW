name: SAPFlow CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install flake8 black pytest pytest-cov requests
      
      - name: Run flake8
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run black check
        run: |
          black --check backend/
      
      - name: Run pytest with coverage
        run: |
          pytest backend/ --cov=backend --cov-report=xml --cov-report=term
      
      - name: Run ABAP Inspector
        env:
          SAP_BTP_HOST: ${{ secrets.SAP_BTP_HOST }}
          SAP_CLIENT_ID: ${{ secrets.SAP_CLIENT_ID }}
          SAP_CLIENT_SECRET: ${{ secrets.SAP_CLIENT_SECRET }}
          SAP_TOKEN_URL: ${{ secrets.SAP_TOKEN_URL }}
          SAP_MOCK_MODE: true
        run: |
          python transport-runner/test_runner.py --transport-id DEVK900001 --source-system DEV --mock

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sapflow-backend
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -f backend/Dockerfile.prod -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sapflow-frontend
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -f frontend/Dockerfile.prod -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      alb_dns: ${{ steps.get-alb.outputs.alb_dns }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update ECS backend service
        run: |
          aws ecs update-service --cluster sapflow-cluster --service sapflow-backend --force-new-deployment
          
      - name: Update ECS frontend service
        run: |
          aws ecs update-service --cluster sapflow-cluster --service sapflow-frontend --force-new-deployment

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable --cluster sapflow-cluster --services sapflow-backend sapflow-frontend

      - name: Get ALB DNS Name
        id: get-alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --names sapflow-alb --query "LoadBalancers[0].DNSName" --output text)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "ALB URL is http://$ALB_DNS"

      - name: Post GitHub status
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'http://${{ steps.get-alb.outputs.alb_dns }}',
              context: 'AWS Deployment',
              description: 'App successfully deployed to AWS ECS Fargate!'
            })

  notify:
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "status": "${{ needs.deploy.result == 'success' && 'success' || 'failed' }}",
              "alb_url": "http://${{ needs.deploy.outputs.alb_dns }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
