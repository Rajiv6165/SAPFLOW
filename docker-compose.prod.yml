version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sapflow
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sapflow-network
    restart: always

  redis:
    image: redis:7-alpine
    networks:
      - sapflow-network
    restart: always

  backend:
    image: ${AWS_ECR_REGISTRY}/sapflow-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/sapflow
      REDIS_URL: redis://redis:6379/0
      SAP_BTP_HOST: ${SAP_BTP_HOST}
      SAP_CLIENT_ID: ${SAP_CLIENT_ID}
      SAP_CLIENT_SECRET: ${SAP_CLIENT_SECRET}
      SAP_TOKEN_URL: ${SAP_TOKEN_URL}
      SAP_MOCK_MODE: ${SAP_MOCK_MODE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      SNS_ALERT_TOPIC_ARN: ${SNS_ALERT_TOPIC_ARN}
    depends_on:
      - postgres
      - redis
    networks:
      - sapflow-network
    restart: always

  frontend:
    image: ${AWS_ECR_REGISTRY}/sapflow-frontend:latest
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_WS_URL: ${WS_URL}
    depends_on:
      - backend
    networks:
      - sapflow-network
    restart: always

  transport-runner:
    image: ${AWS_ECR_REGISTRY}/sapflow-transport-runner:latest
    environment:
      SAP_BTP_HOST: ${SAP_BTP_HOST}
      SAP_CLIENT_ID: ${SAP_CLIENT_ID}
      SAP_CLIENT_SECRET: ${SAP_CLIENT_SECRET}
      SAP_MOCK_MODE: ${SAP_MOCK_MODE:-false}
    networks:
      - sapflow-network
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sapflow-network
    restart: always

networks:
  sapflow-network:
    driver: bridge

volumes:
  postgres_data:
